<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BosqueCR - Vista Smartphone</title>
  <style>
    :root{--bg:#f5f3ec;--frame:#102a43;--accent:#f0b429;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#d9e2ec,#f5f3ec);font-family:Arial,sans-serif;padding:24px}
    .phone{width:min(390px,100%);aspect-ratio:9/19.5;background:#0b141f;border:10px solid var(--frame);border-radius:38px;box-shadow:0 14px 40px rgba(16,42,67,.4);position:relative;overflow:hidden}
    .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:42%;height:24px;background:#000;border-radius:0 0 14px 14px;z-index:3}
    iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff}
    .legend{margin-top:12px;text-align:center;color:#102a43;font-weight:700}
    .legend span{display:inline-block;padding:4px 10px;border-radius:99px;background:var(--accent)}
  </style>
</head>
<body>
  <div>
    <div class="phone" aria-label="Vista previa smartphone BosqueCR">
      <div class="notch"></div>
      <iframe src="./index.html" title="BosqueCR App"></iframe>
    </div>
    <p class="legend"><span>Preview smartphone</span></p>
  </div>
</body>
</html>
